<!DOCTYPE html>
<html>
<head>
    <title>Blood Donor Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>

<style>
body.dark-mode {
    background-color: #121212 !important;
    color: white !important;
}

.dark-mode .card,
.dark-mode .table,
.dark-mode .navbar {
    background-color: #1e1e1e !important;
    color: white !important;
}

.glass {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;
}

#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

</style>
</head>
<link rel="manifest" href="/static/manifest.json">
<body>

<div id="loader">
    <div class="spinner-border text-danger" role="status"></div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🩸 Blood Donor Finder</a>
    <div>
      <button onclick="toggleDarkMode()" class="btn btn-light btn-sm me-2">🌙</button>
      <a class="btn btn-light btn-sm me-2" href="/">Home</a>
    <a class="btn btn-light btn-sm me-2" href="/register">Register</a>
    <a class="btn btn-light btn-sm me-2" href="/search">Find Donor</a>
    <a class="btn btn-warning btn-sm me-2" href="/donor_login">Donor Login</a>
    <a class="btn btn-dark btn-sm" href="/login">Admin</a>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5 animate__animated animate__fadeIn">
    {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-white text-center p-3">
    <small>© 2026 College Internal Blood Donor Management System</small>
</footer>

<script>
window.addEventListener("load", function(){
    document.getElementById("loader").style.display = "none";
});

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
