{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-4">Donor Login</h2>

{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<div class="card shadow p-4 mx-auto" style="max-width:400px;">
    <form method="POST">
        <input type="text" name="erp_id" class="form-control mb-3"
               placeholder="Enter ERP ID" required>
        <button class="btn btn-danger w-100">Login</button>
    </form>
</div>

{% endblock %}
